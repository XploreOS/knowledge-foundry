name: Feature request
description: Propose an improvement to the pipeline, CLI, skill, or templates
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the current toolkit makes hard?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? CLI flags, schema fields, new gates, templates…
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
