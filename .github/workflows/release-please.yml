# Release automation: release-please maintains a release PR from conventional
# commits on main; merging it tags releases and publishes every not-yet-
# published workspace to npm with provenance.
#
# npm auth: OIDC trusted publishing — NO npm token secret. Each package on
# npmjs.com must have a trusted publisher configured (Settings → Trusted
# Publisher): org XploreOS, repo knowledge-foundry, workflow filename
# "release-please.yml". npm only allows configuring this on packages that
# already exist, so the FIRST publish of a new package is manual
# (npm publish --workspace <name> --access public from a logged-in machine);
# every subsequent release publishes tokenlessly from here, with provenance
# generated automatically.
#
# Required repository secret:
#   RELEASE_PLEASE_TOKEN — fine-grained PAT (this repo; Contents: read/write,
#     Pull requests: read/write). Lets the action open the release PR without
#     the org-level "Actions may create PRs" setting, and makes CI run on the
#     release PR (PRs opened by the default GITHUB_TOKEN trigger no workflows).
#     Falls back to GITHUB_TOKEN when unset.

name: Release Please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm --provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      # Trusted publishing needs npm >= 11.5.1 (Node 22 bundles npm 10)
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - name: Publish workspaces to npm (OIDC trusted publishing)
        run: node scripts/publish-workspaces.mjs
