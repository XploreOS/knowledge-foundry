# Release automation: release-please maintains a release PR from conventional
# commits on main; merging it tags releases and publishes every not-yet-
# published workspace to npm with provenance.
#
# Required repository secrets:
#   NPM_TOKEN — npm granular access token with read/write on the
#     @knowledge-foundry packages (or org).
#   RELEASE_PLEASE_TOKEN — fine-grained PAT (this repo; Contents: read/write,
#     Pull requests: read/write). Lets the action open the release PR without
#     the org-level "Actions may create PRs" setting, and makes CI run on the
#     release PR (PRs opened by the default GITHUB_TOKEN trigger no workflows).
#     Falls back to GITHUB_TOKEN when unset.

name: Release Please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm --provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test
      - name: Publish workspaces to npm
        run: node scripts/publish-workspaces.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
