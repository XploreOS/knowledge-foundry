license_classes:
  Green:
    description: Public-domain or explicitly licensed clinical guidelines and open-access literature; safe to ingest broadly.
    requires_review: false
    default_allowed_uses:
      internal_search: true
      rag: true
      extraction: true
      summarization: true
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Yellow:
    description: License or reuse terms are unclear (e.g. a journal article without a confirmed reuse license); requires legal review.
    requires_review: true
    default_allowed_uses:
      internal_search: true
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Orange:
    description: Paid clinical decision-support content or proprietary vendor guidelines requiring contract approval before ingestion.
    requires_review: true
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Red:
    description: Content containing identifiable patient data, or explicitly prohibited from reuse (e.g. withdrawn or retracted guidance).
    requires_review: false
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
blockers:
  - "Contains patient identifiers: source contains identifiable patient information (PHI) that has not been de-identified (block)."
  - "Withdrawn guideline: source is a clinical guideline that has since been withdrawn or superseded (block)."
  - "Single-institution protocol: source is an internal protocol from a single institution and may not generalize (flag for review)."
uncertain_defaults_to: Yellow
source_types:
  - guideline
  - research_article
  - regulation
  - dataset
  - internal_document
  - protocol
  - drug_label
