license_classes:
  Green:
    description: Public-domain or explicitly licensed clinical guidelines and open-access literature; safe to ingest broadly.
    ingestable: true
    requires_review: false
    default_allowed_uses:
      internal_search: true
      rag: true
      extraction: true
      summarization: true
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Yellow:
    description: License or reuse terms are unclear (e.g. a journal article without a confirmed reuse license); requires legal review.
    ingestable: false
    requires_review: true
    default_allowed_uses:
      internal_search: true
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Orange:
    description: Paid clinical decision-support content or proprietary vendor guidelines requiring contract approval before ingestion.
    ingestable: false
    requires_review: true
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Red:
    description: Content containing identifiable patient data, or explicitly prohibited from reuse (e.g. withdrawn or retracted guidance).
    ingestable: false
    requires_review: false
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
blockers:
  - id: contains-patient-identifiers
    description: Source contains identifiable patient information (PHI) that has not been de-identified.
    applies_to: source
    action: block
  - id: withdrawn-guideline
    description: Source is a clinical guideline that has since been withdrawn or superseded.
    applies_to: source
    action: block
  - id: single-institution-protocol
    description: Source is an internal protocol from a single institution and may not generalize.
    applies_to: source
    action: flag
source_types:
  - guideline
  - research_article
  - regulation
  - dataset
  - internal_document
  - protocol
  - drug_label
