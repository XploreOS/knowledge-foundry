stages:
  license_review:
    roles: [legal]
    required: true
    min_approvals: 1
  safety_review:
    roles: [information_security_sme, legal]
    required: true
    min_approvals: 1
  evidence_review:
    roles: [information_security_sme]
    required: true
    min_approvals: 1
  release_review:
    roles: [legal, information_security_sme, product_owner]
    required: true
    min_approvals: 1
