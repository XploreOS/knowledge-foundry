license_classes:
  Green:
    description: Public regulatory filings and government data explicitly available for reuse; safe to ingest broadly.
    ingestable: true
    requires_review: false
    default_allowed_uses:
      internal_search: true
      rag: true
      extraction: true
      summarization: true
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Yellow:
    description: Reuse rights are unclear, such as a news article or aggregator feed without a confirmed license; requires legal review.
    ingestable: false
    requires_review: true
    default_allowed_uses:
      internal_search: true
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Orange:
    description: Paid market-data feeds or proprietary analyst research requiring contract approval before ingestion.
    ingestable: false
    requires_review: true
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Red:
    description: Content containing material non-public information (MNPI) or explicitly prohibited from reuse.
    ingestable: false
    requires_review: false
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
blockers:
  - id: contains-mnpi
    description: Source contains or is suspected to contain material non-public information.
    applies_to: source
    action: block
  - id: premium-market-data-feed
    description: Source is a licensed premium market-data feed requiring an active subscription and usage-rights confirmation.
    applies_to: source
    action: flag
  - id: stale-market-data
    description: Source contains market data that has not been refreshed within the domain's freshness window.
    applies_to: source
    action: flag
source_types:
  - filing
  - regulation
  - analyst_report
  - market_data
  - internal_document
  - news_article
