stages:
  license_review:
    roles: [legal]
    required: true
    min_approvals: 1
  safety_review:
    roles: [compliance_sme, legal]
    required: true
    min_approvals: 2
  evidence_review:
    roles: [compliance_sme]
    required: true
    min_approvals: 1
  release_review:
    roles: [legal, compliance_sme, product_owner]
    required: true
    min_approvals: 1
