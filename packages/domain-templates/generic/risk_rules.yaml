categories:
  - license_violation
  - privacy_violation
  - unsupported_claim
  - outdated_content
rules:
  - id: flag-missing-license-review
    category: license_violation
    description: Flag any chunk sourced from a Yellow or Orange source that has not completed legal review.
    match: {}
    action: flag
    severity: high
  - id: flag-personal-data-mentions
    category: privacy_violation
    description: Flag chunks that mention personal identifiers alongside sensitive context.
    match:
      keywords:
        - social security number
        - date of birth
        - home address
        - personal email
    action: flag
    severity: high
  - id: block-unverified-superlative-claims
    category: unsupported_claim
    description: Block claims that use absolute or superlative language without a cited source.
    match:
      keywords:
        - guaranteed
        - always works
        - proven to eliminate
        - "100% effective"
    action: block
    severity: medium
  - id: downgrade-stale-content
    category: outdated_content
    description: Downgrade evidence level for content not reviewed within the domain's current review cycle.
    match: {}
    action: downgrade
    severity: low
