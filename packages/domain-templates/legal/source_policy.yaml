license_classes:
  Green:
    description: Public-domain primary law (statutes, regulations, published case law) or explicitly licensed secondary sources.
    requires_review: false
    default_allowed_uses:
      internal_search: true
      rag: true
      extraction: true
      summarization: true
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Yellow:
    description: Reuse rights are unclear, such as a commercial legal-research summary without a confirmed license; requires legal review.
    requires_review: true
    default_allowed_uses:
      internal_search: true
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Orange:
    description: Proprietary legal-research platform content requiring contract or subscription-terms approval before ingestion.
    requires_review: true
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
  Red:
    description: Content under privilege, seal, or explicit reuse prohibition; cannot be ingested.
    requires_review: false
    default_allowed_uses:
      internal_search: false
      rag: false
      extraction: false
      summarization: false
      fine_tuning: false
      customer_facing: false
      commercial_distribution: false
blockers:
  - "Overruled precedent: source is a judicial decision that has been overruled, vacated, or otherwise superseded (block)."
  - "Privileged or sealed material: source is subject to attorney-client privilege, work-product protection, or a court seal (block)."
  - "Unconfirmed jurisdiction currency: source's jurisdictional currency (whether it reflects the latest amendments) has not been confirmed (flag for review)."
uncertain_defaults_to: Yellow
source_types:
  - statute
  - regulation
  - case
  - practitioner_commentary
  - internal_document
  - contract_template
