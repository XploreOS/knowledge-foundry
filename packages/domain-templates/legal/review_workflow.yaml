stages:
  license_review:
    roles: [legal]
    required: true
    quorum: 1
  safety_review:
    roles: [supervising_attorney, legal]
    required: true
    quorum: 2
  evidence_review:
    roles: [supervising_attorney]
    required: true
    quorum: 1
  release_review:
    roles: [legal, supervising_attorney, product_owner]
    required: true
    quorum: 1
