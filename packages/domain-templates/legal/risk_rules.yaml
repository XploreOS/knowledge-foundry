categories:
  - unauthorized_legal_advice
  - overruled_precedent
  - jurisdiction_mismatch
  - privacy_violation
  - license_violation
rules:
  - id: block-direct-client-advice-language
    category: unauthorized_legal_advice
    description: Block claims that instruct a specific reader on what legal action to take without an attorney-review qualifier.
    match:
      keywords:
        - you should sue
        - you are entitled to
        - file this claim
        - you do not need a lawyer
    action: block
    severity: high
  - id: flag-unverified-case-status
    category: overruled_precedent
    description: Flag any case citation whose current good-law status has not been verified against a citator.
    match: {}
    action: flag
    severity: high
  - id: flag-cross-jurisdiction-citation
    category: jurisdiction_mismatch
    description: Flag chunks that cite authority from one jurisdiction as though it applied in another without qualification.
    match:
      keywords:
        - in this state
        - applies nationwide
        - in all jurisdictions
    action: flag
    severity: high
  - id: block-client-identifiers
    category: privacy_violation
    description: Block chunks containing identifiable client names, case numbers, or other direct client identifiers.
    match:
      keywords:
        - client name
        - case number
        - social security number
    action: block
    severity: high
  - id: flag-missing-license-review
    category: license_violation
    description: Flag any chunk sourced from a Yellow or Orange source that has not completed legal review.
    match: {}
    action: flag
    severity: high
